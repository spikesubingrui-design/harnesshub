  </g>

  <text x="50" y="256" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="15" fill="#6e7681">
    asgeirtj (CC0) + x1xhlol (GPL)
    <tspan fill="#5dcaa5">  →  </tspan>canonical .harness.json<tspan fill="#5dcaa5">  →  </tspan>your AGENTS.md
