    <g>
      <rect x="370" y="168" width="140" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
      <text x="440" y="193" text-anchor="middle">harness diff</text>
    </g>
    <g>
      <rect x="522" y="168" width="150" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
      <text x="597" y="193" text-anchor="middle">harness watch</text>
    </g>
    <g>
      <rect x="684" y="168" width="168" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
